hyperparameters:
  client:
    batch_size: 32
    local_epochs: 5
    loss: CrossEntropyLoss
    optimizer:
      lr: 0.01
      weight_decay: 1.0e-05
    persistency: true
    scheduler:
      gamma: 1
      step_size: 1
  model: Adult_LogReg
  net_args:
    input_dim: 30
  server:
    weighted: true
    lr: 1.0
name: fluke.algorithms.fedavg.FedAVG
