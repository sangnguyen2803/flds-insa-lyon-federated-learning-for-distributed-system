hyperparameters:
  client:
    batch_size: 64
    local_epochs: 5
    loss: CrossEntropyLoss
    noise_mul: 0.4
    max_grad_norm: 1.0
    optimizer:
      lr: 0.005
      weight_decay: 1.0e-05
    persistency: true
    scheduler:
      gamma: 1
      step_size: 1
  model: Adult_LogReg
  net_args:
    input_dim: 14
  server:
    weighted: true
    lr: 1.0
name: fluke.algorithms.dpfedavg.DPFedAVG
